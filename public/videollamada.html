<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>VIDASALUD · Videoconsulta</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    #app { display: flex; flex-direction: column; height: 100%; }

    /* ── Barra superior ── */
    #header {
      background: #065F46;
      padding: 10px 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      /* Espacio para notch en iPhone */
      padding-top: max(10px, env(safe-area-inset-top));
    }

    #header-left { display: flex; align-items: center; gap: 8px; }

    #live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80;
      display: none;
      animation: pulse 2s infinite;
    }
    #live-dot.show { display: inline-block; }

    #header-title { font-size: 13px; font-weight: 700; color: #fff; }

    #live-badge {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.12);
      border-radius: 20px; padding: 2px 8px;
      display: none;
    }
    #live-badge.show { display: inline-block; }

    #btn-salir {
      background: #DC2626; border: none; color: #fff;
      border-radius: 8px; padding: 6px 14px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-salir:active { opacity: 0.8; }

    /* ── Área de video ── */
    #video-area { flex: 1; position: relative; background: #111; overflow: hidden; }

    #loading {
      position: absolute; inset: 0; z-index: 10;
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.3s ease;
    }
    #loading.oculto { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #059669;
      animation: spin 0.8s linear infinite;
    }

    .loading-titulo { font-size: 14px; font-weight: 600; color: #fff; text-align: center; }
    .loading-sub    { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; text-align: center; }

    #error-panel {
      display: none;
      flex-direction: column; align-items: center; gap: 14px;
      padding: 28px; text-align: center;
    }
    #error-panel.show { display: flex; }
    .error-icono { font-size: 44px; }
    .error-titulo { font-size: 15px; font-weight: 700; color: #fff; }
    .error-msg    { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px; line-height: 1.5; }
    #btn-cerrar-error {
      margin-top: 4px; background: #059669; border: none; color: #fff;
      border-radius: 10px; padding: 12px 28px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    #daily-iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #daily-iframe.visible { opacity: 1; }

    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  </style>
</head>
<body>
  <div id="app">

    <div id="header">
      <div id="header-left">
        <span id="live-dot"></span>
        <span id="header-title">VIDASALUD · Videoconsulta</span>
        <span id="live-badge">En vivo</span>
      </div>
      <button id="btn-salir">Salir ✕</button>
    </div>

    <div id="video-area">

      <div id="loading">
        <div class="spinner"></div>
        <div>
          <div class="loading-titulo">Conectando a la videoconsulta…</div>
          <div class="loading-sub">Permite el acceso a cámara y micrófono cuando se solicite</div>
        </div>
      </div>

      <div id="error-panel">
        <span class="error-icono">⚠️</span>
        <div>
          <div class="error-titulo">No se pudo conectar</div>
          <div class="error-msg" id="error-msg">La sala no está disponible en este momento.</div>
        </div>
        <button id="btn-cerrar-error">Cerrar</button>
      </div>

      <iframe
        id="daily-iframe"
        allow="camera; microphone; display-capture; fullscreen; autoplay; clipboard-write"
        allowfullscreen
      ></iframe>

    </div>
  </div>

  <script>
    var params    = new URLSearchParams(window.location.search);
    var dailyUrl  = params.get('url');

    var iframe        = document.getElementById('daily-iframe');
    var loading       = document.getElementById('loading');
    var errorPanel    = document.getElementById('error-panel');
    var errorMsg      = document.getElementById('error-msg');
    var liveDot       = document.getElementById('live-dot');
    var liveBadge     = document.getElementById('live-badge');

    function salir() {
      iframe.src = '';
      window.parent.postMessage({ type: 'VIDASALUD_LEAVE' }, '*');
    }

    function mostrarError(msg) {
      loading.classList.add('oculto');
      iframe.classList.remove('visible');
      errorPanel.classList.add('show');
      if (msg) errorMsg.textContent = msg;
    }

    document.getElementById('btn-salir').addEventListener('click', salir);
    document.getElementById('btn-cerrar-error').addEventListener('click', salir);

    if (!dailyUrl) {
      mostrarError('URL de sala no proporcionada.');
    } else {
      iframe.addEventListener('load', function () {
        loading.classList.add('oculto');
        iframe.classList.add('visible');
        liveDot.classList.add('show');
        liveBadge.classList.add('show');
      });

      // Timeout de seguridad: si tras 20 s el iframe no cargó, mostrar error
      var timeoutId = setTimeout(function () {
        if (!iframe.classList.contains('visible')) {
          mostrarError('La sala tardó demasiado en responder. Verifica tu conexión.');
        }
      }, 20000);

      iframe.addEventListener('load', function () { clearTimeout(timeoutId); });

      iframe.src = dailyUrl;
    }
  </script>
</body>
</html>
